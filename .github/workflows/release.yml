# ──────────────────────────────────────────────────────────────────────────────
# Furo — Cross-Platform Release Workflow
#
# Builds Windows (NSIS) and macOS (DMG) installers, signs updater artifacts,
# generates latest.json, and publishes a GitHub Release.
#
# Trigger: Push a version tag (v*) created by release.ps1.
# Secrets required:
#   TAURI_SIGNING_PRIVATE_KEY  — minisign private key (long base64 string)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD — key password (short string, or empty)
# ──────────────────────────────────────────────────────────────────────────────

name: Release

on:
  push:
    tags:
      - "v*"

# Only one release at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # Windows build (NSIS installer)
  # ════════════════════════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows External Binaries
        shell: pwsh
        run: |
          Write-Host "Downloading LFS binaries from dependencies release to bypass LFS quota..."
          Invoke-WebRequest -Uri "https://github.com/AreKS103/Furo/releases/download/dependencies-v1/windows-whisper-binaries.zip" -OutFile "windows-whisper-binaries.zip"
          Expand-Archive "windows-whisper-binaries.zip" -DestinationPath "src-tauri/binaries" -Force
          Remove-Item "windows-whisper-binaries.zip"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (Windows NSIS)
        run: npx tauri build --bundles nsis

      - name: List artifacts
        if: always()
        continue-on-error: true
        shell: pwsh
        run: |
          if (Test-Path "src-tauri\target\release\bundle") {
            Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse | Format-Table Name, Length
          } else {
            Write-Warning "Bundle directory does not exist — Tauri build likely failed above."
            Write-Host "Contents of src-tauri\target\release (if it exists):"
            if (Test-Path "src-tauri\target\release") {
              Get-ChildItem -Path "src-tauri\target\release" -Depth 1 | Format-Table Name, Length
            }
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # macOS build (DMG installer)
  # ════════════════════════════════════════════════════════════════════════════
  build-macos:
    runs-on: macos-14   # Apple Silicon (M1) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (aarch64 + x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true

      - name: Install system dependencies
        run: |
          brew install cmake

      - name: Build whisper.cpp sidecar (Universal — Apple Silicon + Intel)
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp

          # Build for Apple Silicon (arm64) — static link so no dylib needed at runtime
          cmake -B build-arm64 -DCMAKE_BUILD_TYPE=Release -DWHISPER_BUILD_SERVER=ON -DWHISPER_COREML=OFF \
            -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_SHARED_LIBS=OFF
          cmake --build build-arm64 --config Release -j$(sysctl -n hw.logicalcpu)

          # Build for Intel (x86_64) — disable NATIVE and METAL, static link.
          # Metal GPU shaders crash on Intel/AMD GPUs (whisper.cpp #1292);
          # Intel Macs will use CPU-only inference instead.
          cmake -B build-x86_64 -DCMAKE_BUILD_TYPE=Release -DWHISPER_BUILD_SERVER=ON -DWHISPER_COREML=OFF \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 -DGGML_NATIVE=OFF -DGGML_METAL=OFF -DBUILD_SHARED_LIBS=OFF
          cmake --build build-x86_64 --config Release -j$(sysctl -n hw.logicalcpu)

          # Verify no dynamic libwhisper dependency
          echo "=== Checking arm64 binary dependencies ==="
          otool -L build-arm64/bin/whisper-server || true
          echo "=== Checking x86_64 binary dependencies ==="
          otool -L build-x86_64/bin/whisper-server || true

          # Tauri universal builds: compile step needs per-arch sidecars,
          # bundle step needs a universal-apple-darwin lipo binary.
          cp build-arm64/bin/whisper-server "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          cp build-x86_64/bin/whisper-server "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-x86_64-apple-darwin"

          # Create the universal (fat) binary for the bundle step
          lipo -create \
            build-arm64/bin/whisper-server \
            build-x86_64/bin/whisper-server \
            -output "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-universal-apple-darwin"

          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-x86_64-apple-darwin"
          chmod +x "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-universal-apple-darwin"

          # Ad-hoc code sign the sidecar binaries so macOS Gatekeeper doesn't
          # silently SIGKILL them when spawned from inside the .app bundle.
          codesign --force --sign - "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          codesign --force --sign - "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-x86_64-apple-darwin"
          codesign --force --sign - "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-universal-apple-darwin"

          file "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-aarch64-apple-darwin"
          file "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-x86_64-apple-darwin"
          file "$GITHUB_WORKSPACE/src-tauri/binaries/whisper-server-universal-apple-darwin"
          ls -la "$GITHUB_WORKSPACE/src-tauri/binaries/"

      - name: Patch tauri.conf.json for macOS
        shell: bash
        run: |
          # Remove Windows-only DLL resources and fix bundle identifier
          python3 -c "
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              conf = json.load(f)
          # Remove Windows DLL resources entirely (not needed on macOS)
          if 'resources' in conf.get('bundle', {}):
              del conf['bundle']['resources']
          # Fix identifier — .app suffix conflicts on macOS
          if conf['identifier'].endswith('.app'):
              conf['identifier'] = conf['identifier'][:-4] + '.desktop'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Patched tauri.conf.json for macOS')
          "
          echo "--- Patched tauri.conf.json ---"
          cat src-tauri/tauri.conf.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (macOS app + DMG — Universal)
        env:
          # Ensure ort crate can download ONNX Runtime without GitHub rate limits
          GITHUB_TOKEN: ${{ github.token }}
        # app bundle is required for createUpdaterArtifacts to produce .app.tar.gz + .sig
        run: npx tauri build --target universal-apple-darwin --bundles app,dmg

      - name: Ad-hoc sign the .app bundle and re-package updater artifact
        run: |
          APP_BUNDLE=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::No .app bundle found"
            exit 1
          fi

          echo "Signing $APP_BUNDLE (deep, ad-hoc)..."
          codesign --force --deep --sign - "$APP_BUNDLE"
          codesign -dvv "$APP_BUNDLE" 2>&1 || true

          # Re-create the .app.tar.gz with the signed bundle so the updater
          # delivers a signed app (the original tar.gz has the unsigned copy).
          TAR_GZ=$(find src-tauri/target/universal-apple-darwin/release/bundle/macos -name "*.app.tar.gz" ! -name "*.sig" | head -1)
          if [ -n "$TAR_GZ" ]; then
            APP_NAME=$(basename "$APP_BUNDLE")
            BUNDLE_DIR=$(dirname "$APP_BUNDLE")
            echo "Re-packaging $TAR_GZ with signed bundle..."
            tar czf "$TAR_GZ" -C "$BUNDLE_DIR" "$APP_NAME"

            # Re-sign the tar.gz with the Tauri updater key
            if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
              npx --yes @tauri-apps/cli signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
                ${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:+--password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD"} \
                "$TAR_GZ"
            fi
          fi

      - name: List artifacts
        if: always()
        run: |
          echo "=== All bundle output ==="
          find src-tauri/target/universal-apple-darwin/release/bundle/ -type f 2>/dev/null || true

      - name: Collect macOS artifacts
        run: |
          mkdir -p collected-macos
          cp src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg collected-macos/ 2>/dev/null || true
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz collected-macos/ 2>/dev/null || true
          cp src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig collected-macos/ 2>/dev/null || true
          echo "=== Collected macOS artifacts ==="
          ls -la collected-macos/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: collected-macos/*
          if-no-files-found: error

  # ════════════════════════════════════════════════════════════════════════════
  # Publish GitHub Release with all platform artifacts + latest.json
  # ════════════════════════════════════════════════════════════════════════════
  publish:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete previous releases and tags
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ github.ref_name }}
        run: |
          # List all releases except the one being published right now.
          # Deletes the release body + all its assets, then removes the git tag.
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName \
            --jq '.[].tagName' | while read tag; do
            if [[ "$tag" != "$CURRENT_TAG" ]]; then
              echo "Deleting release: $tag"
              gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
            fi
          done

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-artifacts
          path: artifacts/macos

      - name: List all artifacts
        run: find artifacts/ -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="AreKS103/Furo"

          echo "=== Available artifacts ==="
          find artifacts/ -type f | sort

          # Read Windows NSIS signature
          WIN_SIG_FILE=$(find artifacts/windows -name "*.nsis.zip.sig" | head -1)
          WIN_ZIP=$(find artifacts/windows -name "*.nsis.zip" ! -name "*.sig" | head -1)

          # Read macOS updater signature
          MAC_SIG_FILE=$(find artifacts/macos -name "*.app.tar.gz.sig" | head -1)
          MAC_TAR=$(find artifacts/macos -name "*.app.tar.gz" ! -name "*.sig" | head -1)

          # Validate all required files were found
          for f in "$WIN_SIG_FILE" "$WIN_ZIP" "$MAC_SIG_FILE" "$MAC_TAR"; do
            if [[ -z "$f" || ! -f "$f" ]]; then
              echo "::error::Required artifact not found: '$f'"
              echo "Artifacts present:"
              find artifacts/ -type f | sort
              exit 1
            fi
          done

          WIN_SIG=$(tr -d '\n\r' < "$WIN_SIG_FILE")
          WIN_ZIP_NAME=$(basename "$WIN_ZIP")
          WIN_URL="https://github.com/${REPO}/releases/download/${TAG}/${WIN_ZIP_NAME}"

          MAC_SIG=$(tr -d '\n\r' < "$MAC_SIG_FILE")
          MAC_TAR_NAME=$(basename "$MAC_TAR")
          MAC_URL="https://github.com/${REPO}/releases/download/${TAG}/${MAC_TAR_NAME}"

          # Generate latest.json via python (avoids heredoc/jq quoting issues with signatures)
          export VERSION TAG PUB_DATE WIN_SIG WIN_URL MAC_SIG MAC_URL
          python3 -c "
          import json, os
          data = {
              'version': os.environ['VERSION'],
              'notes': 'Furo ' + os.environ['TAG'],
              'pub_date': os.environ['PUB_DATE'],
              'platforms': {
                  'windows-x86_64': {
                      'signature': os.environ['WIN_SIG'],
                      'url': os.environ['WIN_URL'],
                  },
                  'darwin-aarch64': {
                      'signature': os.environ['MAC_SIG'],
                      'url': os.environ['MAC_URL'],
                  },
                  'darwin-x86_64': {
                      'signature': os.environ['MAC_SIG'],
                      'url': os.environ['MAC_URL'],
                  },
              },
          }
          with open('artifacts/latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          "

          echo "Generated latest.json:"
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Furo ${{ github.ref_name }}
          body: "Furo ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/windows/*
            artifacts/macos/*
            artifacts/latest.json
